<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ελληνική Αρθροσκοπική Εταιρεία | Mini App</title>
  <meta name="description" content="Mini app της Ελληνικής Αρθροσκοπικής Εταιρείας με newsletter, συνέδρια, webinars, ανακοινώσεις, υποτροφίες και χρήσιμους συνδέσμους.">
  <meta name="theme-color" content="#162b57">
  <link rel="manifest" href="manifest.json?v=20260630-3">
  <link rel="apple-touch-icon" href="images/icon-192.png?v=20260630-3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="EAE">
  <link rel="stylesheet" href="style.css?v=20260630-3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <div class="background-logo" style="background-image: url('images/EAE_logo_EN.png');"></div>

    <header class="app-header">
      <img class="clinic-logo" src="images/EAE_logo_EN.png" alt="Ελληνική Αρθροσκοπική Εταιρεία">
      <div class="header-text">
        <h1>Ελληνική Αρθροσκοπική Εταιρεία</h1>
        <p>Γεώργιος Νούλης</p>
      </div>
    </header>

    <section class="welcome-card">
      <p class="welcome-label">EAE MINI APP</p>
      <h2>Ενημέρωση, δράσεις και σύνδεσμοι</h2>
    </section>

    <section class="install-panel" aria-label="Εγκατάσταση εφαρμογής">
      <button id="installBtn" class="install-button" type="button">
        <i data-lucide="download"></i>
        <span>Εγκατάσταση εφαρμογής</span>
      </button>
      <p id="iosInstallHint" class="install-help">Σε iPhone/iPad: Κοινή χρήση και μετά Προσθήκη στην οθόνη αφετηρίας.</p>
    </section>

    <a class="appointment-card" href="https://www.eae-net.gr/el/newsletter-gr" target="_blank" rel="noopener noreferrer">
      <div class="appointment-icon"><i data-lucide="mail"></i></div>
      <section>
        <h2>Newsletter</h2>
        <p>Εγγραφή και ενημέρωση για νέα και δράσεις</p>
      </section>
      <span aria-hidden="true">›</span>
    </a>

    <main class="dashboard-grid">
      <a class="grid-card" href="https://www.eae-net.gr/el/draseis-eae" target="_blank" rel="noopener noreferrer"><i data-lucide="calendar-days"></i><strong>Συνέδρια</strong></a>
      <a class="grid-card" href="https://www.eae-net.gr/el/draseis-eae/webinars-eae" target="_blank" rel="noopener noreferrer"><i data-lucide="video"></i><strong>Webinars</strong></a>
      <a class="grid-card" href="https://www.eae-net.gr/el/anakoinoseis" target="_blank" rel="noopener noreferrer"><i data-lucide="megaphone"></i><strong>Ανακοινώσεις</strong></a>
      <a class="grid-card" href="https://www.eae-net.gr/el/ipotrofies/ipotrofies-taxidiotikes" target="_blank" rel="noopener noreferrer"><i data-lucide="award"></i><strong>Υποτροφίες</strong></a>
      <a class="grid-card" href="https://www.eae-net.gr/el/contact-gr" target="_blank" rel="noopener noreferrer"><i data-lucide="mail"></i><strong>Επικοινωνία</strong></a>
      <a class="grid-card" href="https://www.esska.org/" target="_blank" rel="noopener noreferrer"><i data-lucide="external-link"></i><strong>ESSKA</strong></a>
    </main>
  </div>

  <script>
    lucide.createIcons();

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    const iosHint = document.getElementById('iosInstallHint');

    const isIos = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    if (isIos && !isStandalone) {
      iosHint.style.display = 'block';
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-flex';
      iosHint.style.display = 'none';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
      iosHint.style.display = 'none';
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
