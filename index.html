<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Γεώργιος Ροντογιάννης | Mini App</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <img
      class="clinic-logo"
      src="https://georgiosrontogiannis.gr/wp-content/uploads/2022/01/cropped-RONTOGIANNIS-logo-2.webp"
      alt="Γεώργιος Ροντογιάννης">

    <div class="header-text">
      <h1>Γεώργιος Ροντογιάννης</h1>
      <p>Ορθοπεδικός Χειρουργός</p>
    </div>
  </header>

  <a class="appointment-card" href="https://iatreioxalkida.youcanbook.me/">
    <div>
      <i data-lucide="calendar-days"></i>
    </div>

    <section>
      <h2>Κλείσιμο Ραντεβού</h2>
      <p>Online κράτηση 24/7</p>
    </section>

    <span>›</span>
  </a>

  <main class="dashboard-grid">

    <a class="grid-card" href="#">
      <i data-lucide="upload-cloud"></i>
      <strong>Αποστολή<br>Εξετάσεων</strong>
    </a>

    <a class="grid-card" href="#">
      <i data-lucide="clipboard-list"></i>
      <strong>Οδηγίες<br>Ασθενών</strong>
    </a>

    <a class="grid-card" href="tel:+302221021010">
      <i data-lucide="phone"></i>
      <strong>Καλέστε<br>το Ιατρείο</strong>
    </a>

    <a class="grid-card" href="https://maps.app.goo.gl/kZmDH5XcsfjVbznt6?g_st=ac">
      <i data-lucide="map-pin"></i>
      <strong>Οδηγίες<br>Πρόσβασης</strong>
    </a>

    <a class="grid-card" href="#">
      <i data-lucide="file-text"></i>
      <strong>Έντυπα<br>Ασθενών</strong>
    </a>

    <a class="grid-card" href="https://g.page/r/CZXGdi5AnGtLEBE/review">
      <i data-lucide="star"></i>
      <strong>Αφήστε<br>Αξιολόγηση</strong>
    </a>

  </main>

</div>

<script>
  lucide.createIcons();
</script>

</body>
</html>
